<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Which BEL Bird Are You? - UQ Quiz</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --uq-purple: #51247A;
            --uq-gold: #FBB800;
            --dark-purple: #2B1D37;
            --light-grey: #D7D1CC;
            --magenta: #962A8B;
            --white: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--dark-purple) 0%, var(--uq-purple) 100%);
            color: var(--dark-purple);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 1024px;
            max-height: 100vh;
            background: var(--white);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 20px 30px;
            background: linear-gradient(135deg, var(--uq-purple) 0%, var(--magenta) 100%);
            color: var(--white);
            text-align: center;
            user-select: none;
            cursor: pointer;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
        }

        .progress-bar {
            height: 6px;
            background: var(--light-grey);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--uq-gold) 0%, var(--magenta) 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            padding: 12px 30px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .screen-welcome {
            text-align: center;
        }

        .screen-welcome h2 {
            font-size: 36px;
            color: var(--uq-purple);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .screen-welcome p {
            font-size: 18px;
            color: #555;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .screen-welcome .highlights {
            background: #f0e6ff;
            border-left: 4px solid var(--uq-gold);
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            text-align: left;
            font-size: 15px;
            line-height: 1.8;
        }

        .screen-welcome .highlights strong {
            color: var(--uq-purple);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--uq-purple) 0%, var(--magenta) 100%);
            color: var(--white);
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(81, 36, 122, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(81, 36, 122, 0.4);
        }

        .lead-form {
            background: #f9f7fc;
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--dark-purple);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--light-grey);
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--uq-purple);
        }

        .question-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-purple);
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--white);
            border: 2px solid var(--light-grey);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-card:nth-child(1) { animation-delay: 0.05s; }
        .option-card:nth-child(2) { animation-delay: 0.1s; }
        .option-card:nth-child(3) { animation-delay: 0.15s; }
        .option-card:nth-child(4) { animation-delay: 0.2s; }
        .option-card:nth-child(5) { animation-delay: 0.25s; }
        .option-card:nth-child(6) { animation-delay: 0.3s; }
        .option-card:nth-child(7) { animation-delay: 0.35s; }
        .option-card:nth-child(8) { animation-delay: 0.4s; }

        .option-card.not-really {
            background: #f5f5f5;
            border-color: #ddd;
            opacity: 0.75;
        }

        .option-card:hover:not(.selected) {
            border-color: var(--uq-purple);
            background: #f9f7fc;
        }

        .option-card.selected {
            background: linear-gradient(135deg, rgba(81, 36, 122, 0.1), rgba(150, 42, 139, 0.1));
            border-color: var(--uq-purple);
            animation: pulse 0.6s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .option-icon {
            font-size: 32px;
            margin-right: 16px;
            min-width: 40px;
            text-align: center;
        }

        .option-card.not-really .option-icon {
            opacity: 0;
            display: none;
        }

        .option-content {
            flex: 1;
        }

        .option-label {
            font-weight: 600;
            color: var(--dark-purple);
            font-size: 16px;
        }

        .option-card.not-really .option-label {
            color: #999;
            font-weight: 500;
            font-size: 14px;
        }

        /* World Map Styles */
        .world-map-container {
            position: relative;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
        }
        .world-map-svg {
            width: 100%;
            height: auto;
        }
        .map-region {
            cursor: pointer;
            transition: all 0.2s ease;
            fill: var(--light-grey);
            stroke: #fff;
            stroke-width: 1;
        }
        .map-region:hover {
            fill: #e8d5f5;
            filter: drop-shadow(0 0 6px rgba(81, 36, 122, 0.3));
        }
        .map-region.selected {
            fill: var(--uq-purple);
            filter: drop-shadow(0 0 8px rgba(81, 36, 122, 0.5));
        }
        .map-label {
            pointer-events: none;
            font-size: 11px;
            font-weight: 700;
            fill: var(--dark-purple);
            text-anchor: middle;
        }
        .map-region.selected + .map-label,
        .map-label.selected {
            fill: #fff;
        }
        .map-pin {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .map-pin:hover {
            transform: scale(1.15);
        }
        .map-pin.selected circle {
            fill: var(--uq-purple);
            stroke: var(--uq-gold);
            stroke-width: 2;
        }
        .map-stay-home {
            text-align: center;
            margin-top: 12px;
            padding: 10px 24px;
            color: #999;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fafafa;
            transition: all 0.2s;
        }
        .map-stay-home:hover {
            border-color: var(--uq-purple);
            color: var(--dark-purple);
        }

        .transition-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .transition-screen h2 {
            font-size: 32px;
            color: var(--uq-purple);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .transition-screen p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
            max-width: 400px;
        }

        .transition-screen .tap-hint {
            font-size: 13px;
            color: #aaa;
            margin-top: 20px;
        }

        .result-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }

        .bird-svg {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-heading {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-purple);
            margin-bottom: 12px;
        }

        .result-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
            max-width: 500px;
        }

        .program-box {
            background: linear-gradient(135deg, rgba(81, 36, 122, 0.08), rgba(251, 184, 0, 0.08));
            border: 2px solid var(--uq-purple);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            width: 100%;
        }

        .program-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--magenta);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .program-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--uq-purple);
            margin-bottom: 12px;
        }

        .program-major {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .program-headline {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            font-style: italic;
        }

        .secondary-program {
            background: #f9f7fc;
            border: 1px solid var(--light-grey);
            border-radius: 10px;
            padding: 16px;
            margin: 16px 0;
            width: 100%;
        }

        .secondary-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .secondary-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--uq-purple);
            margin-bottom: 8px;
        }

        .secondary-copy {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .rationale-section {
            background: #fffbf0;
            border-left: 4px solid var(--uq-gold);
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            width: 100%;
        }

        .rationale-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--magenta);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .rationale-text {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
        }

        .lifestyle-icons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .lifestyle-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px;
            background: #f0e6ff;
            border-radius: 8px;
            font-size: 28px;
            min-width: 50px;
        }

        .lifestyle-label {
            font-size: 11px;
            color: #666;
            text-align: center;
            font-weight: 500;
        }

        .caveat-section {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
            width: 100%;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            width: 100%;
        }

        .btn-start-over {
            background: var(--uq-purple);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start-over:active {
            transform: scale(0.98);
        }

        .btn-back {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.85);
            border: 1.5px solid var(--light-grey);
            color: #999;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        .btn-back:hover {
            border-color: var(--uq-purple);
            color: var(--uq-purple);
        }
        .btn-back:active {
            transform: scale(0.97);
        }

        .multi-select-hint {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            text-align: center;
        }

        .btn-done {
            background: var(--uq-purple);
            color: var(--white);
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 24px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-done.active {
            opacity: 1;
            pointer-events: auto;
        }
        .btn-done.active:active {
            transform: scale(0.97);
        }

        .qr-placeholder {
            width: 100px;
            height: 100px;
            background: var(--light-grey);
            border-radius: 8px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }

        .debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            padding: 12px;
            border-radius: 6px;
            max-width: 300px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 9999;
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .debug-panel.show {
            display: block;
        }

        .special-note {
            background: #fff3cd;
            border-left: 4px solid var(--uq-gold);
            border-radius: 6px;
            padding: 14px;
            margin: 16px 0;
            font-size: 14px;
            color: #664d03;
            line-height: 1.5;
            text-align: left;
            width: 100%;
        }

        .inactivity-warning {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--white);
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 5000;
            animation: slideUp 0.3s ease-out;
        }

        @media (max-height: 800px) {
            .content {
                padding: 20px;
            }
            .question-title {
                font-size: 18px;
                margin-bottom: 16px;
            }
            .option-card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const MAX_SCORES = { ANA: 13, SOC: 14, DRI: 16, VIS: 14, EXP: 9 };

        const PROGRAM_PROFILES = {
            BCom:    { ANA: 3, SOC: 0, DRI: 0.5, VIS: 0, EXP: 1.5 },
            BEcon:   { ANA: 3, SOC: 0, DRI: 1, VIS: 3, EXP: 1 },

        const PROGRAM_HEADLINES = {

        const GOWN_COLORS = {
            BCom: 'purple',

            BBusMan: 'blue',
            BAdvBus: 'blue',
            BTHEM: 'blue',
            BEcon: 'green',
            BPPE: 'green',

        };

        const PROGRAM_ACCESSORIES = {

            BEcon: 'globe_graph',
            BBusMan: 'clipboard',
            BTHEM: 'lanyard',
            BAdvBus: 'grad_cap_star',
            BAFE: 'ticker_tape',
            BPPE: 'ppe_venn',
            Law: 'barrister_wig'
        };

        // Questions data
        const LAYER1_QUESTIONS = [
            {
                id: 'Q1',
                title: "You're stuck in traffic and your mind starts wandering. What do you end up thinking about?",
                options: [
                    { text: "I wonder how traffic light timing is actually optimised... there must be an algorithm", scoring: { ANA: 2, EXP: 1 }, icon: "🚦" },
                    { text: "I'm mentally planning tonight — who's coming, where we're going, what we need", scoring: { SOC: 2, EXP: 1 }, icon: "💬" },

            {

                    { text: "Most Likely to Get Straight A's Without Telling Anyone", scoring: { ANA: 2, DRI: 1 }, icon: "📚" },
                    { text: "Most Likely to Change a School Policy", scoring: { DRI: 1, VIS: 2 }, icon: "📋" }
                ]
            },
            {
                id: 'Q4',
                title: "Your school is losing money on its canteen. The principal asks for ideas. You...",

                    { text: "Survey students about what they'd actually buy — then pitch a whole new menu", scoring: { SOC: 2, EXP: 1 }, icon: "🍔" },
                    { text: "Look at what other schools do better and bring in an outside food vendor", scoring: { SOC: 1, DRI: 2 }, icon: "🏪" },

            {

                    { text: "The sponsorship pitches — I'll convince local businesses to back us", scoring: { SOC: 1, DRI: 2 }, icon: "🎪" }
                ]
            },
            {
                id: 'Q6',
                title: "You're given the power to fix ONE thing about your city. You tackle...",
                options: [
                    { text: "The nightlife — more festivals, better events, actual things to do on weekends", scoring: { SOC: 2, EXP: 1 }, icon: "🎉" },

        // BRANCHING & HONING LOGIC
        // ========================================
        function selectBranch(scores) {
            const numbersAffinity = scores.ANA * 1.2;
            const peopleAffinity = scores.SOC + (scores.EXP * 0.5);
            const ideasAffinity = scores.VIS * 1.2;
            const driveSignal = scores.DRI;

            const affinities = [
                { family: 'numbers', score: numbersAffinity },
                { family: 'people', score: peopleAffinity },
                { family: 'ideas', score: ideasAffinity },
            ].sort((a, b) => b.score - a.score);

            const gap = affinities[0].score - affinities[1].score;

            if (gap <= 2) {
                const pair = [affinities[0].family, affinities[1].family].sort().join('+');
                if (pair === 'numbers+people') return 'cross_numbers_people';
                if (pair === 'ideas+numbers') return 'cross_numbers_ideas';
                if (pair === 'ideas+people') return 'cross_people_ideas';
            }

            if (affinities[0].family === 'numbers') return 'numbers';
            if (affinities[0].family === 'people') {
                return driveSignal >= 4 ? 'people_drive' : 'people';
            }
            if (affinities[0].family === 'ideas') {
                return scores.SOC >= 3 ? 'ideas_social' : 'ideas';
            }
            return 'people';
        }

        function selectHoningQuestions(programRankings) {
            const top1 = programRankings[0];
            const top2 = programRankings[1];
            const gap = top1.score - top2.score;

            if (gap > 0.15) return { pair: null, questions: LAYER3_QUESTIONS['H_CONFIRM'] };

            const pair = [top1.program, top2.program].sort().join('_');
            const honingMap = {
                'BCom_BAFE': 'BCom_BAFE',
                'BBusMan_BTHEM': 'BBusMan_BTHEM',
                'BAdvBus_BBusMan': 'BAdvBus_BBusMan',
                'BAdvBus_BAFE': 'BAdvBus_BAFE',
                'BEcon_BPPE': 'BEcon_BPPE',
                'BPPE_Law': 'BPPE_Law',

                'BCom_BEcon': 'BCom_BEcon',
                'BBusMan_Law': 'BBusMan_Law',
                'BAdvBus_Law': 'BAdvBus_Law',
                'BCom_BBusMan': 'BCom_BBusMan',
            };

            const key = honingMap[pair];
            if (key && LAYER3_QUESTIONS[key]) {
                return { pair: pair, questions: LAYER3_QUESTIONS[key] };
            }
            return { pair: null, questions: LAYER3_QUESTIONS['H_CONFIRM'] };

        // Utility Functions
        function calculateScoresFromQuestions(questions, answers) {
            const scores = { ANA: 0, SOC: 0, DRI: 0, VIS: 0, EXP: 0 };
            questions.forEach(q => {
                if (answers[q.id] !== null && answers[q.id] !== undefined) {
                    const option = q.options[answers[q.id]];
                    if (option && option.scoring) {
                        Object.entries(option.scoring).forEach(([dim, points]) => {
                            scores[dim] += points;
                        });
                    }
                }
            });
            return scores;
        }

        function calculateAllScores(allAnswers, branchQuestions, honingQuestions) {
            const scores = { ANA: 0, SOC: 0, DRI: 0, VIS: 0, EXP: 0 };
            const addScores = (questions) => {
                questions.forEach(q => {
                    if (allAnswers[q.id] !== null && allAnswers[q.id] !== undefined) {
                        const option = q.options[allAnswers[q.id]];
                        if (option && option.scoring) {
                            Object.entries(option.scoring).forEach(([dim, points]) => {
                                scores[dim] += points;
                            });
                        }
                    }
                });
            };
            addScores(LAYER1_QUESTIONS);
            if (branchQuestions) addScores(branchQuestions);
            if (honingQuestions) addScores(honingQuestions);
            return scores;
        }

        function determineBird(scores) {
            const ibisScore = scores.SOC + scores.EXP;
            const turkeyScore = scores.ANA + scores.DRI;
            if (ibisScore > turkeyScore + 2) return { bird: 'ibis', tied: false };
            if (turkeyScore > ibisScore + 2) return { bird: 'turkey', tied: false };
            return { bird: Math.random() > 0.5 ? 'ibis' : 'turkey', tied: true };
        }

        function normaliseScores(scores) {
            const normalised = {};
            Object.entries(scores).forEach(([dim, score]) => {
                normalised[dim] = (score / MAX_SCORES[dim]) * 3;
            });
            return normalised;
        }

        function cosineSimilarity(vec1, vec2) {
            const dims = ['ANA', 'SOC', 'DRI', 'VIS', 'EXP'];
            let dotProduct = 0, mag1 = 0, mag2 = 0;
            dims.forEach(d => {
                dotProduct += (vec1[d] || 0) * (vec2[d] || 0);
                mag1 += (vec1[d] || 0) ** 2;
                mag2 += (vec2[d] || 0) ** 2;
            });
            return dotProduct / (Math.sqrt(mag1) * Math.sqrt(mag2));
        }

        function findPrograms(scores) {
            const normalised = normaliseScores(scores);
            const similarities = Object.entries(PROGRAM_PROFILES).map(([prog, profile]) => ({
                program: prog,
                similarity: cosineSimilarity(normalised, profile)
            })).sort((a, b) => b.similarity - a.similarity);

            const primary = similarities[0].program;
            const secondary = similarities[1].program;
            const tertiary = similarities[2].program;

            const tertiaryIncluded = similarities[2].similarity >= similarities[0].similarity * 0.9;

            return { primary, secondary, tertiary: tertiaryIncluded ? tertiary : null, allSimilarities: similarities };
        }

        function getMajorSuggestion(program, scores) {
            const thresholds = {
                high: (dim) => scores[dim] > MAX_SCORES[dim] * 0.65,
                moderate: (dim) => scores[dim] >= MAX_SCORES[dim] * 0.25 && scores[dim] <= MAX_SCORES[dim] * 0.65,
                low: (dim) => scores[dim] < MAX_SCORES[dim] * 0.25
            };

            switch (program) {
                case 'BCom':
                    if (thresholds.high('ANA') && thresholds.low('DRI')) return 'Accounting';
                    if (thresholds.high('ANA') && thresholds.moderate('EXP')) return 'Business Analytics';
                    if (thresholds.high('ANA') && !thresholds.high('DRI') && thresholds.low('VIS')) return 'Business Information Systems';
                    return 'Finance';
                case 'BEcon':
                    if (thresholds.high('ANA')) return 'Quantitative Analysis';
                    if (thresholds.high('VIS') && thresholds.moderate('SOC')) return 'Economics of Strategy and Behaviour';
                    return 'Economics and Public Policy';
                case 'BBusMan':
                    if (thresholds.high('SOC') && thresholds.high('DRI')) return 'Innovation & Entrepreneurship';
                    if (thresholds.high('SOC') && thresholds.moderate('DRI')) return 'Leadership & Management Science';
                    if (thresholds.high('SOC') && thresholds.moderate('EXP')) return 'Human Resources';
                    return 'Marketing';
                case 'BTHEM':
                    if (thresholds.high('SOC') && thresholds.low('EXP')) return 'Hotel and Hospitality Management';
                    return 'Tourism and Event Management';
                case 'BAdvBus':
                    if (thresholds.high('ANA') && thresholds.high('DRI')) return ['Accounting', 'Finance'];
                    if (thresholds.high('SOC') && thresholds.high('DRI')) return ['Marketing', 'Innovation & Entrepreneurship'];
                    return ['Marketing', 'Finance'];
                case 'BAFE':
                    if (thresholds.moderate('VIS')) return 'Economics';
                    return 'Finance';
                case 'BPPE':
                    if (thresholds.high('VIS') && thresholds.moderate('ANA')) return 'Economics';
                    if (thresholds.high('VIS') && thresholds.high('SOC')) return 'Politics';
                    if (thresholds.high('VIS') && thresholds.low('ANA')) return 'Philosophy';
                    return 'Combination of all three';
                case 'Law':
                    if (thresholds.high('ANA')) return 'paired with BCom';
                    if (thresholds.high('VIS')) return 'paired with BEcon';
                    if (thresholds.high('EXP')) return 'paired with Arts';
                    return 'paired with BBusMan';
                default:
                    return null;
            }
        }

        function generateRationale(scores, primaryProgram) {
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const top1 = sorted[0][0];
            const top2 = sorted[1][0];

            const dimensionDescriptions = {
                ANA: "you're drawn to numbers, data, and working out how systems tick",
                SOC: "you're a people person who thrives on connection and collaboration",
                DRI: "you've got serious drive — you want to go deep and be the best at what you do",
                VIS: "you think big-picture — you care about ideas, policy, and how the world works",
                EXP: "you love variety and keeping your options open"
            };

            const programReasons = {
                BCom: "The Bachelor of Commerce gives you a rock-solid technical foundation in finance, accounting, analytics, or information systems — with room for 8 free electives to explore other interests.",
                BEcon: "The Bachelor of Economics is Queensland's only standalone economics degree — it's for people who want to understand why markets crash, governments make bad decisions, and people behave irrationally.",
                BBusMan: "The Bachelor of Business Management is the broadest degree in BEL — 7 majors, 16 dual degree options, and maximum flexibility to find your lane while keeping every door open.",
                BTHEM: "The Bachelor of Tourism, Hospitality and Event Management is for people who create experiences — festivals, hotels, sporting events. And with Brisbane hosting the 2032 Olympics, your timing is perfect.",
                BAdvBus: "The Bachelor of Advanced Business (Honours) is the Swiss Army knife of honours degrees — up to 2 majors across 8 specialisations, built-in honours, and a choice of professional or research pathway in your final year. It's not the backup — it's the most versatile honours program in the faculty.",
                BAFE: "The Bachelor of Advanced Finance and Economics (Honours) is one of a kind in Australia — half economics, half finance, with 50% of courses you can't take anywhere else. It's built for a very specific career path: investment banking, economic consulting, fund management, the Reserve Bank.",
                BPPE: "The Bachelor of Politics, Philosophy and Economics (Honours) combines three disciplines that most degrees keep separate. You'll study with a small cohort of big thinkers, debating the ideas that shape governments and societies. Think Oxford's PPE, but in Brisbane.",
                Law: "UQ Law is Queensland's oldest and most respected law school — three former Chief Justices of Australia studied here. It's best studied as a dual degree, so you'll graduate with two qualifications and twice the career options."
            };

            let rationale = `Your answers showed that ${dimensionDescriptions[top1]}`;
            if (top2 && scores[top2] > 0) {
                rationale += `, and ${dimensionDescriptions[top2]}`;
            }
            rationale += `. ${programReasons[primaryProgram]}`;
            return rationale;
        }
