        // Main App Component
        function BELBirdQuiz() {
            const [screen, setScreen] = useState('welcome');
            const [studentName, setStudentName] = useState('');
            const [studentEmail, setStudentEmail] = useState('');
            const [allAnswers, setAllAnswers] = useState({});
            const [phase2Answers, setPhase2Answers] = useState({});
            const [mathsProxy, setMathsProxy] = useState('neutral');
            const [showDebug, setShowDebug] = useState(false);
            const [inactivityWarning, setInactivityWarning] = useState(false);

            // Branching state
            const [selectedBranch, setSelectedBranch] = useState(null);
            const [branchQuestions, setBranchQuestions] = useState([]);
            const [honingData, setHoningData] = useState({ pair: null, questions: [] });
            const [scoresAfterLayer1, setScoresAfterLayer1] = useState(null);
            const [scoresAfterLayer2, setScoresAfterLayer2] = useState(null);
            const [questionSequence, setQuestionSequence] = useState([]);

            const inactivityTimer = useRef(null);
            const debugTripleClick = useRef(0);

            // Get current scores from all answered questions
            const getCurrentScores = () => {
                return calculateAllScores(allAnswers, branchQuestions, honingData.questions);
            };

            const handleMathsProxy = (questionId, optionIndex) => {
                if (questionId === 'Q5' && LAYER1_QUESTIONS[4].options[optionIndex]?.mathsProxy) {
                    setMathsProxy('strong');
                }
            };

            // ---- LAYER 1 HANDLERS ----
            const handleLayer1Answer = (questionId, optionIndex) => {
                handleMathsProxy(questionId, optionIndex);
                setAllAnswers(prev => ({ ...prev, [questionId]: optionIndex }));
                setQuestionSequence(prev => [...prev.filter(id => id !== questionId), questionId]);
                resetInactivityTimer();
            };

            // Called when Layer 1 completes — determines branch
            const completeLayer1 = () => {
                const l1Scores = calculateScoresFromQuestions(LAYER1_QUESTIONS, allAnswers);
                setScoresAfterLayer1({ ...l1Scores });
                const branch = selectBranch(l1Scores);
                setSelectedBranch(branch);
                const bQuestions = LAYER2_QUESTIONS[branch] || [];
                setBranchQuestions(bQuestions);
                setScreen('transition-1');
            };

            // ---- LAYER 2 HANDLERS ----
            const handleLayer2Answer = (questionId, optionIndex) => {
                setAllAnswers(prev => ({ ...prev, [questionId]: optionIndex }));
                setQuestionSequence(prev => [...prev.filter(id => id !== questionId), questionId]);
                resetInactivityTimer();
            };

            // Called when Layer 2 completes — determines honing
            const completeLayer2 = () => {
                const l2Scores = calculateAllScores(allAnswers, branchQuestions, []);
                setScoresAfterLayer2({ ...l2Scores });

                // Calculate program rankings to determine honing
                const normalised = normaliseScores(l2Scores);
                const rankings = Object.entries(PROGRAM_PROFILES).map(([prog, profile]) => ({
                    program: prog,
                    score: cosineSimilarity(normalised, profile)
                })).sort((a, b) => b.score - a.score);

                const honing = selectHoningQuestions(rankings);
                setHoningData(honing);
                setScreen('transition-2');
            };

            // ---- LAYER 3 HANDLERS ----
            const handleLayer3Answer = (questionId, optionIndex) => {
                setAllAnswers(prev => ({ ...prev, [questionId]: optionIndex }));
                setQuestionSequence(prev => [...prev.filter(id => id !== questionId), questionId]);
                resetInactivityTimer();
            };

            const completeLayer3 = () => {
                setScreen('transition-3');
            };

            // ---- PHASE 2 HANDLERS (unchanged from v3) ----
            const handlePhase2Answer = (questionId, optionIndex) => {
                const option = PHASE2_QUESTIONS.find(q => q.id === questionId)?.options[optionIndex];
                if (option?.subQuestion) {
                    setPhase2Answers(prev => ({ ...prev, [questionId]: optionIndex }));
                    setScreen('L4b');
                } else {
                    setPhase2Answers(prev => ({ ...prev, [questionId]: optionIndex }));
                    const currentIdx = PHASE2_QUESTIONS.findIndex(q => q.id === questionId);
                    const nextQIdx = currentIdx + 1;
                    const nextQ = nextQIdx < PHASE2_QUESTIONS.length ? PHASE2_QUESTIONS[nextQIdx] : null;
                    if (nextQ && nextQ.id !== 'L4b') {
                        setScreen(nextQ.id);
                    } else {
                        showResultsScreen();
                    }
                }
                resetInactivityTimer();
            };

            const handleL4bAnswer = (optionIndex) => {
                setPhase2Answers(prev => ({ ...prev, 'L4b': optionIndex }));
                showResultsScreen();
                resetInactivityTimer();
            };

            const handleMultiSelectToggle = (questionId, optionIndex) => {
                const current = Array.isArray(phase2Answers[questionId]) ? [...phase2Answers[questionId]] : [];
                const question = PHASE2_QUESTIONS.find(q => q.id === questionId);
                const option = question?.options[optionIndex];

                if (option?.notReallyMyThing) {
                    setPhase2Answers(prev => ({ ...prev, [questionId]: [optionIndex] }));
                    resetInactivityTimer();
                    return;
                }

                const notReallyIdx = question?.options.findIndex(o => o.notReallyMyThing);
                const filtered = current.filter(i => i !== notReallyIdx);

                if (filtered.includes(optionIndex)) {
                    setPhase2Answers(prev => ({ ...prev, [questionId]: filtered.filter(i => i !== optionIndex) }));
                } else {
                    setPhase2Answers(prev => ({ ...prev, [questionId]: [...filtered, optionIndex] }));
                }
                resetInactivityTimer();
            };

            const handleMultiSelectDone = (questionId) => {
                const currentIdx = PHASE2_QUESTIONS.findIndex(q => q.id === questionId);
                const nextQIdx = currentIdx + 1;
                const nextQ = nextQIdx < PHASE2_QUESTIONS.length ? PHASE2_QUESTIONS[nextQIdx] : null;
                if (nextQ && nextQ.id !== 'L4b') {
                    setScreen(nextQ.id);
                } else {
                    showResultsScreen();
                }
                resetInactivityTimer();
            };

            function showResultsScreen() {
                setScreen('result');
            }

            // ---- BACK BUTTON ----
            const handleBack = () => {
                resetInactivityTimer();
                // Layer 1
                if (screen === 'Q1') {
                    setScreen('leadCapture');
                } else if (screen.startsWith('Q')) {
                    const qIdx = parseInt(screen[1]);
                    setScreen(`Q${qIdx - 1}`);
                }
                // Transitions
                else if (screen === 'transition-1') {
                    setScreen('Q8');
                } else if (screen === 'transition-2') {
                    setScreen('B4');
                } else if (screen === 'transition-3') {
                    const hQuestions = honingData.questions;
                    if (hQuestions.length > 0) {
                        setScreen(`H${hQuestions.length}`);
                    } else {
                        setScreen('transition-2');
                    }
                }
                // Layer 2
                else if (screen === 'B1') {
                    setScreen('transition-1');
                } else if (screen.startsWith('B')) {
                    const bIdx = parseInt(screen[1]);
                    setScreen(`B${bIdx - 1}`);
                }
                // Layer 3
                else if (screen === 'H1') {
                    setScreen('transition-2');
                } else if (screen.startsWith('H') && screen !== 'result') {
                    const hIdx = parseInt(screen[1]);
                    setScreen(`H${hIdx - 1}`);
                }
                // Phase 2
                else if (screen === 'L1') {
                    setScreen('transition-3');
                } else if (screen === 'L4b') {
                    setScreen('L4');
                } else if (screen.startsWith('L')) {
                    const currentIdx = PHASE2_QUESTIONS.findIndex(q => q.id === screen);
                    if (currentIdx > 0) {
                        setScreen(PHASE2_QUESTIONS[currentIdx - 1].id);
                    }
                }
            };

            // ---- UTILITIES ----
            function resetInactivityTimer() {
                if (inactivityTimer.current) clearTimeout(inactivityTimer.current);
                setInactivityWarning(false);
                inactivityTimer.current = setTimeout(() => {
                    if (screen !== 'welcome' && screen !== 'result') {
                        setInactivityWarning(true);
                        setTimeout(() => handleStartOver(), 2000);
                    }
                }, 45000);
            }

            function handleStartOver() {
                setScreen('welcome');
                setStudentName('');
                setStudentEmail('');
                setAllAnswers({});
                setPhase2Answers({});
                setMathsProxy('neutral');
                setSelectedBranch(null);
                setBranchQuestions([]);
                setHoningData({ pair: null, questions: [] });
                setScoresAfterLayer1(null);
                setScoresAfterLayer2(null);
                setQuestionSequence([]);
                if (inactivityTimer.current) clearTimeout(inactivityTimer.current);
            }

            const handleHeaderClick = () => {
                debugTripleClick.current++;
                setTimeout(() => { debugTripleClick.current = 0; }, 500);
                if (debugTripleClick.current === 3) {
                    setShowDebug(!showDebug);
                    debugTripleClick.current = 0;
                }
            };

            // ---- PROGRESS BAR ----
            const getProgress = () => {
                if (screen.startsWith('Q')) {
                    const qIdx = parseInt(screen[1]);
                    return { percent: (qIdx / 8) * 25, label: 'Getting to know you...' };
                }
                if (screen === 'transition-1') return { percent: 25, label: 'Getting to know you...' };
                if (screen.startsWith('B')) {
                    const bIdx = parseInt(screen[1]);
                    return { percent: 25 + (bIdx / 4) * 25, label: 'Narrowing it down...' };
                }
                if (screen === 'transition-2') return { percent: 50, label: 'Narrowing it down...' };
                if (screen.startsWith('H')) {
                    const hIdx = parseInt(screen[1]);
                    const total = honingData.questions.length || 1;
                    return { percent: 50 + (hIdx / total) * 25, label: 'Almost there...' };
                }
                if (screen === 'transition-3') return { percent: 75, label: 'Almost there...' };
                if (screen.startsWith('L')) {
                    const progressIdx = screen === 'L4b' ? 5 : parseInt(screen[1]);
                    return { percent: 75 + (progressIdx / 5) * 25, label: 'Building your UQ life' };
                }
                return { percent: 0, label: '' };
            };

            // ---- KEYBOARD SHORTCUTS ----
            useEffect(() => {
                const handleKeyPress = (e) => {
                    // Layer 1
                    if (screen.startsWith('Q')) {
                        const qIdx = parseInt(screen[1]);
                        const q = LAYER1_QUESTIONS[qIdx - 1];
                        if (e.key >= '1' && e.key <= '4') {
                            const optionIdx = parseInt(e.key) - 1;
                            if (optionIdx < q.options.length) {
                                handleLayer1Answer(q.id, optionIdx);
                                if (qIdx === 8) {
                                    setTimeout(() => completeLayer1(), 400);
                                } else {
                                    setTimeout(() => setScreen(`Q${qIdx + 1}`), 400);
                                }
                            }
                        }
                        if (e.key === 'Backspace') handleBack();
                    }
                    // Layer 2
                    else if (screen.startsWith('B')) {
                        const bIdx = parseInt(screen[1]);
                        const q = branchQuestions[bIdx - 1];
                        if (q && e.key >= '1' && e.key <= '4') {
                            const optionIdx = parseInt(e.key) - 1;
                            if (optionIdx < q.options.length) {
                                handleLayer2Answer(q.id, optionIdx);
                                if (bIdx === 4) {
                                    setTimeout(() => completeLayer2(), 400);
                                } else {
                                    setTimeout(() => setScreen(`B${bIdx + 1}`), 400);
                                }
                            }
                        }
                        if (e.key === 'Backspace') handleBack();
                    }
                    // Layer 3
                    else if (screen.startsWith('H')) {
                        const hIdx = parseInt(screen[1]);
                        const q = honingData.questions[hIdx - 1];
                        if (q && e.key >= '1' && e.key <= '4') {
                            const optionIdx = parseInt(e.key) - 1;
                            if (optionIdx < q.options.length) {
                                handleLayer3Answer(q.id, optionIdx);
                                if (hIdx >= honingData.questions.length) {
                                    setTimeout(() => completeLayer3(), 400);
                                } else {
                                    setTimeout(() => setScreen(`H${hIdx + 1}`), 400);
                                }
                            }
                        }
                        if (e.key === 'Backspace') handleBack();
                    }
                    // Phase 2
                    else if (screen.startsWith('L')) {
                        const qId = screen;
                        const q = PHASE2_QUESTIONS.find(qq => qq.id === qId);
                        if (q && e.key >= '1' && e.key <= '8') {
                            const optionIdx = parseInt(e.key) - 1;
                            if (optionIdx < q.options.length) {
                                if (q.multiSelect) {
                                    handleMultiSelectToggle(q.id, optionIdx);
                                } else {
                                    handlePhase2Answer(q.id, optionIdx);
                                }
                            }
                        }
                        if (q && (e.key === 'n' || e.key === 'N')) {
                            const notReallyIdx = q.options.findIndex(o => o.notReallyMyThing);
                            if (notReallyIdx >= 0) {
                                if (q.multiSelect) {
                                    handleMultiSelectToggle(q.id, notReallyIdx);
                                } else {
                                    handlePhase2Answer(q.id, notReallyIdx);
                                }
                            }
                        }
                        if (q && q.multiSelect && (e.code === 'Enter' || e.code === 'Space')) {
                            const selections = Array.isArray(phase2Answers[qId]) ? phase2Answers[qId] : [];
                            if (selections.length > 0) handleMultiSelectDone(qId);
                        }
                        if (e.key === 'Backspace') handleBack();
                    }
                    // Transitions
                    else if (screen.startsWith('transition') || screen === 'result') {
                        if (e.code === 'Space') {
                            if (screen === 'transition-1') setScreen('B1');
                            else if (screen === 'transition-2') setScreen('H1');
                            else if (screen === 'transition-3') setScreen('L1');
                            else if (screen === 'result') handleStartOver();
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyPress);
                if (screen !== 'welcome' && screen !== 'result') {
                    resetInactivityTimer();
                }
                return () => window.removeEventListener('keydown', handleKeyPress);
            }, [screen, allAnswers, phase2Answers, branchQuestions, honingData]);

            // Auto-advance transitions
            useEffect(() => {
                if (screen.startsWith('transition')) {
                    const timer = setTimeout(() => {
                        if (screen === 'transition-1') setScreen('B1');
                        else if (screen === 'transition-2') setScreen('H1');
                        else if (screen === 'transition-3') setScreen('L1');
                    }, 2000);
                    return () => clearTimeout(timer);
                }
            }, [screen]);

            // ---- DEBUG PANEL ----
            const renderDebug = () => {
                if (!showDebug) return null;
                const scores = getCurrentScores();
                return (
                    <div style={{
                        position: 'fixed', bottom: 0, left: 0, right: 0,
                        background: 'rgba(0,0,0,0.9)', color: '#0f0', fontSize: '11px',
                        padding: '8px 12px', fontFamily: 'monospace', zIndex: 100,
                        maxHeight: '120px', overflow: 'auto'
                    }}>
                        <strong>DEBUG</strong> | Screen: {screen} | Branch: {selectedBranch || 'none'} | Honing: {honingData.pair || 'none'}
                        <br/>ANA:{scores.ANA}/{MAX_SCORES.ANA} SOC:{scores.SOC}/{MAX_SCORES.SOC} DRI:{scores.DRI}/{MAX_SCORES.DRI} VIS:{scores.VIS}/{MAX_SCORES.VIS} EXP:{scores.EXP}/{MAX_SCORES.EXP}
                        <br/>Maths: {mathsProxy} | Qs answered: {questionSequence.length} | Seq: {questionSequence.join(',')}
                    </div>
                );
            };

            // =============================================
            // SCREEN RENDERING
            // =============================================

            // WELCOME
            if (screen === 'welcome') {
                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>UQ Open Day Quiz</p>
                        </div>
                        <div className="content screen-welcome">
                            <h2>Ready to find your perfect program?</h2>
                            <p>Answer a few quick questions about your personality, ambitions, and what makes you tick.</p>
                            <div className="highlights">
                                <strong>What you'll discover:</strong><br/>
                                ✓ Your BEL match (8 programs, one's right for you)<br/>
                                ✓ Your major suggestion<br/>
                                ✓ Why UQ works for your style
                            </div>
                            <button className="btn-primary" onClick={() => {
                                setScreen('leadCapture');
                                resetInactivityTimer();
                            }}>
                                Let's Go 🚀
                            </button>
                        </div>
                        {renderDebug()}
                    </div>
                );
            }

            // LEAD CAPTURE
            if (screen === 'leadCapture') {
                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Quick intro</p>
                        </div>
                        <div className="content">
                            <h2 style={{ fontSize: '24px', marginBottom: '24px', color: '#51247A' }}>Let's get to know you</h2>
                            <div className="lead-form">
                                <div className="form-group">
                                    <label>Your name</label>
                                    <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="Your name" />
                                </div>
                                <div className="form-group">
                                    <label>Your email</label>
                                    <input type="email" value={studentEmail} onChange={(e) => setStudentEmail(e.target.value)} placeholder="your.email@example.com" />
                                </div>
                            </div>
                            <button className="btn-primary" onClick={() => {
                                if (studentName && studentEmail) {
                                    setScreen('Q1');
                                    resetInactivityTimer();
                                }
                            }}>
                                Continue to Quiz
                            </button>
                        </div>
                        {renderDebug()}
                    </div>
                );
            }

            // LAYER 1: Universal questions (Q1-Q8)
            if (screen.startsWith('Q')) {
                const qIdx = parseInt(screen[1]) - 1;
                const question = LAYER1_QUESTIONS[qIdx];
                const progress = getProgress();

                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Phase 1: Your Personality</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${progress.percent}%` }}></div>
                        </div>
                        <div className="progress-text">{progress.label}</div>
                        <div className="content">
                            <h2 className="question-title">{question.title}</h2>
                            <div className="options-container">
                                {question.options.map((option, idx) => (
                                    <div
                                        key={idx}
                                        className={`option-card ${allAnswers[question.id] === idx ? 'selected' : ''}`}
                                        onClick={() => {
                                            handleLayer1Answer(question.id, idx);
                                            if (qIdx === 7) {
                                                setTimeout(() => completeLayer1(), 400);
                                            } else {
                                                setTimeout(() => setScreen(`Q${qIdx + 2}`), 400);
                                            }
                                        }}
                                    >
                                        <div className="option-icon">{option.icon}</div>
                                        <div className="option-content">
                                            <div className="option-label">{option.text}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // TRANSITION 1: Layer 1 → Layer 2
            if (screen === 'transition-1') {
                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Narrowing it down...</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: '25%' }}></div>
                        </div>
                        <div className="content transition-screen">
                            <h2>Great start! 🎯</h2>
                            <p>We're getting a feel for what makes you tick. Now let's dig a little deeper...</p>
                            <p className="tap-hint">Tap to continue (or wait 2 seconds...)</p>
                            <button className="btn-primary" onClick={() => setScreen('B1')}>
                                Keep Going
                            </button>
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // LAYER 2: Branch-specific questions (B1-B4)
            if (screen.startsWith('B')) {
                const bIdx = parseInt(screen[1]) - 1;
                const question = branchQuestions[bIdx];
                if (!question) { setScreen('transition-2'); return null; }
                const progress = getProgress();

                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Phase 2: Narrowing Down</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${progress.percent}%` }}></div>
                        </div>
                        <div className="progress-text">{progress.label}</div>
                        <div className="content">
                            <h2 className="question-title">{question.title}</h2>
                            <div className="options-container">
                                {question.options.map((option, idx) => (
                                    <div
                                        key={idx}
                                        className={`option-card ${allAnswers[question.id] === idx ? 'selected' : ''}`}
                                        onClick={() => {
                                            handleLayer2Answer(question.id, idx);
                                            if (bIdx === 3) {
                                                setTimeout(() => completeLayer2(), 400);
                                            } else {
                                                setTimeout(() => setScreen(`B${bIdx + 2}`), 400);
                                            }
                                        }}
                                    >
                                        <div className="option-icon">{option.icon}</div>
                                        <div className="option-content">
                                            <div className="option-label">{option.text}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // TRANSITION 2: Layer 2 → Layer 3
            if (screen === 'transition-2') {
                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Almost there...</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: '50%' }}></div>
                        </div>
                        <div className="content transition-screen">
                            <h2>Nearly there! ✨</h2>
                            <p>Just a couple more to lock in your perfect match...</p>
                            <p className="tap-hint">Tap to continue (or wait 2 seconds...)</p>
                            <button className="btn-primary" onClick={() => setScreen('H1')}>
                                Final Stretch
                            </button>
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // LAYER 3: Honing questions (H1-H4, variable count)
            if (screen.startsWith('H') && screen !== 'result') {
                const hIdx = parseInt(screen[1]) - 1;
                const question = honingData.questions[hIdx];
                if (!question) { completeLayer3(); return null; }
                const progress = getProgress();

                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Phase 3: The Decider</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${progress.percent}%` }}></div>
                        </div>
                        <div className="progress-text">{progress.label}</div>
                        <div className="content">
                            <h2 className="question-title">{question.title}</h2>
                            <div className="options-container">
                                {question.options.map((option, idx) => (
                                    <div
                                        key={idx}
                                        className={`option-card ${allAnswers[question.id] === idx ? 'selected' : ''}`}
                                        onClick={() => {
                                            handleLayer3Answer(question.id, idx);
                                            if (hIdx >= honingData.questions.length - 1) {
                                                setTimeout(() => completeLayer3(), 400);
                                            } else {
                                                setTimeout(() => setScreen(`H${hIdx + 2}`), 400);
                                            }
                                        }}
                                    >
                                        <div className="option-icon">{option.icon}</div>
                                        <div className="option-content">
                                            <div className="option-label">{option.text}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // TRANSITION 3: Layer 3 → Phase 2 Lifestyle
            if (screen === 'transition-3') {
                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Building your UQ life</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: '75%' }}></div>
                        </div>
                        <div className="content transition-screen">
                            <h2>Nice one! 🎉</h2>
                            <p>Now let's figure out what YOUR UQ life looks like.</p>
                            <p className="tap-hint">Tap to continue (or wait 2 seconds...)</p>
                            <button className="btn-primary" onClick={() => setScreen('L1')}>
                                Tell Me About Your UQ Life
                            </button>
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // PHASE 2: Lifestyle questions (L1-L4b) — unchanged from v3
            if (screen.startsWith('L')) {
                const qId = screen;
                const question = PHASE2_QUESTIONS.find(q => q.id === qId);
                const progress = getProgress();
                const isMulti = question.multiSelect;
                const multiSelections = isMulti && Array.isArray(phase2Answers[qId]) ? phase2Answers[qId] : [];

                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Which BEL Bird Are You?</h1>
                            <p>Your UQ Life</p>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${progress.percent}%` }}></div>
                        </div>
                        <div className="progress-text">{progress.label}</div>
                        <div className="content">
                            <h2 className="question-title">{question.title}</h2>
                            {isMulti && <p className="multi-select-hint">Tap as many as you like, then hit Done</p>}
                            {question.isMap ? (
                                <WorldMap
                                    onSelect={(idx) => {
                                        setPhase2Answers(prev => ({ ...prev, [qId]: idx }));
                                        resetInactivityTimer();
                                        setTimeout(() => {
                                            const currentIdx = PHASE2_QUESTIONS.findIndex(q => q.id === qId);
                                            const nextQIdx = currentIdx + 1;
                                            const nextQ = nextQIdx < PHASE2_QUESTIONS.length ? PHASE2_QUESTIONS[nextQIdx] : null;
                                            if (nextQ && nextQ.id !== 'L4b') {
                                                setScreen(nextQ.id);
                                            } else {
                                                showResultsScreen();
                                            }
                                        }, 600);
                                    }}
                                    selectedIdx={phase2Answers[qId]}
                                />
                            ) : (
                            <div className="options-container">
                                {question.options.map((option, idx) => (
                                    <div
                                        key={idx}
                                        className={`option-card ${option.notReallyMyThing ? 'not-really' : ''} ${
                                            isMulti
                                                ? multiSelections.includes(idx) ? 'selected' : ''
                                                : qId === 'L4b'
                                                    ? phase2Answers['L4b'] === idx ? 'selected' : ''
                                                    : phase2Answers[qId] === idx ? 'selected' : ''
                                        }`}
                                        onClick={() => {
                                            if (isMulti) {
                                                handleMultiSelectToggle(qId, idx);
                                            } else if (qId === 'L4b') {
                                                handleL4bAnswer(idx);
                                            } else {
                                                handlePhase2Answer(qId, idx);
                                            }
                                        }}
                                    >
                                        <div className="option-icon">{option.icon}</div>
                                        <div className="option-content">
                                            <div className="option-label">{option.text}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            )}
                            {isMulti && (
                                <button
                                    className={`btn-done ${multiSelections.length > 0 ? 'active' : ''}`}
                                    onClick={() => handleMultiSelectDone(qId)}
                                >
                                    Done ✓
                                </button>
                            )}
                        </div>
                        <button className="btn-back" onClick={handleBack}>← Back</button>
                        {renderDebug()}
                    </div>
                );
            }

            // RESULT SCREEN
            if (screen === 'result') {
                const scores = getCurrentScores();
                const { bird, tied } = determineBird(scores);
                const { primary, secondary, tertiary } = findPrograms(scores);
                const majors = getMajorSuggestion(primary, scores);
                const rationale = generateRationale(scores, primary);

                const imageElements = {
                    bird: bird,
                    gown: GOWN_COLORS[primary],
                    programAccessory: PROGRAM_ACCESSORIES[primary],
                    exchange: PHASE2_QUESTIONS[0].options[phase2Answers.L1]?.tag || null,
                    club: Array.isArray(phase2Answers.L2)
                        ? phase2Answers.L2.map(i => PHASE2_QUESTIONS[1].options[i]?.tag).filter(Boolean)
                        : PHASE2_QUESTIONS[1].options[phase2Answers.L2]?.tag ? [PHASE2_QUESTIONS[1].options[phase2Answers.L2].tag] : [],
                    sport: Array.isArray(phase2Answers.L3)
                        ? phase2Answers.L3.map(i => PHASE2_QUESTIONS[2].options[i]?.tag).filter(Boolean)
                        : PHASE2_QUESTIONS[2].options[phase2Answers.L3]?.tag ? [PHASE2_QUESTIONS[2].options[phase2Answers.L3].tag] : [],
                    sideQuest: phase2Answers['L4'] !== undefined ? PHASE2_QUESTIONS[3].options[phase2Answers['L4']]?.tag : null,
                    language: phase2Answers['L4b'] !== undefined ? PHASE2_QUESTIONS[4].options[phase2Answers['L4b']]?.tag : null
                };

                const fullData = {
                    studentName,
                    studentEmail,
                    timestamp: new Date().toISOString(),
                    allAnswers,
                    phase2: phase2Answers,
                    branchSelected: selectedBranch,
                    honingPair: honingData.pair,
                    honingQuestionsUsed: honingData.questions.map(q => q.id),
                    totalQuestionsAnswered: questionSequence.length + Object.keys(phase2Answers).length,
                    questionSequence: [...questionSequence, ...Object.keys(phase2Answers)],
                    scoresAfterLayer1,
                    scoresAfterLayer2,
                    scoresFinal: scores,
                    mathsProxy,
                    bird,
                    birdTied: tied,
                    primaryProgram: primary,
                    primaryMajors: Array.isArray(majors) ? majors : [majors],
                    secondaryProgram: secondary,
                    tertiary,
                    rationale,
                    imageElements
                };

                console.log('QUIZ_RESULT_JSON:', JSON.stringify(fullData, null, 2));

                const birdComponent = bird === 'ibis' ? <IbisSVG /> : bird === 'turkey' ? <TurkeySVG /> : <HybridSVG />;
                const birdName = bird === 'ibis' ? 'Bin Chicken' : bird === 'turkey' ? 'Bush Turkey' : 'Rare Hybrid';
                const birdPersonality = bird === 'ibis'
                    ? "Resourceful, social, endlessly adaptable. You find opportunity where others see chaos. UQ is your playground."
                    : bird === 'turkey'
                    ? "Bold, focused, and unstoppable. You know what you want and you build the nest to get it. UQ is your proving ground."
                    : "Adaptable AND focused? That's a dangerous combination. UQ is your territory.";

                return (
                    <div className="container">
                        <div className="header" onClick={handleHeaderClick}>
                            <h1>🐦 Your Result</h1>
                            <p>You're a {birdName}</p>
                        </div>
                        <div className="content result-screen">
                            {birdComponent}
                            <h2 className="result-heading">{studentName}, you're a {birdName}!</h2>
                            <p className="result-subtitle">{birdPersonality}</p>

                            <div className="program-box">
                                <div className="program-label">Your Path</div>
                                <div className="program-name">{primary}</div>
                                {majors && <div className="program-major">Maybe majoring in {Array.isArray(majors) ? majors.join(' or ') : majors}</div>}
                                <div className="program-headline">{PROGRAM_HEADLINES[primary]}</div>
                            </div>

                            {secondary && (
                                <div className="secondary-program">
                                    <div className="secondary-label">Also Worth a Look</div>
                                    <div className="secondary-name">{secondary}</div>
                                    <div className="secondary-copy">{PROGRAM_HEADLINES[secondary]}</div>
                                </div>
                            )}

                            <div className="rationale-section">
                                <div className="rationale-label">Why We Think This Suits You</div>
                                <div className="rationale-text">{rationale}</div>
                            </div>

                            <div className="lifestyle-icons">
                                {phase2Answers.L1 !== undefined && PHASE2_QUESTIONS[0].options[phase2Answers.L1]?.icon && (
                                    <div className="lifestyle-badge">
                                        {PHASE2_QUESTIONS[0].options[phase2Answers.L1].icon}
                                        <div className="lifestyle-label">Exchange</div>
                                    </div>
                                )}
                                {Array.isArray(phase2Answers.L2) && phase2Answers.L2.map(i => (
                                    PHASE2_QUESTIONS[1].options[i]?.icon ? (
                                        <div key={'club-'+i} className="lifestyle-badge">
                                            {PHASE2_QUESTIONS[1].options[i].icon}
                                            <div className="lifestyle-label">Club</div>
                                        </div>
                                    ) : null
                                ))}
                                {Array.isArray(phase2Answers.L3) && phase2Answers.L3.map(i => (
                                    PHASE2_QUESTIONS[2].options[i]?.icon ? (
                                        <div key={'sport-'+i} className="lifestyle-badge">
                                            {PHASE2_QUESTIONS[2].options[i].icon}
                                            <div className="lifestyle-label">Sport</div>
                                        </div>
                                    ) : null
                                ))}
                                {phase2Answers.L4 !== undefined && PHASE2_QUESTIONS[3].options[phase2Answers.L4]?.icon && (
                                    <div className="lifestyle-badge">
                                        {PHASE2_QUESTIONS[3].options[phase2Answers.L4].icon}
                                        <div className="lifestyle-label">Quest</div>
                                    </div>
                                )}
                            </div>

                            <div className="qr-placeholder">QR Code Placeholder</div>

                            <div className="caveat-section">
                                This is a fun quiz, not a crystal ball! It's a starting point for exploring your options — not a definitive answer. For real guidance, come chat to us at the BEL booth, visit <strong>study.uq.edu.au/bel</strong>, or book a free session with our Future Students team.
                            </div>

                            <div className="result-actions">
                                <button className="btn-start-over" onClick={handleStartOver}>Start Over</button>
                            </div>
                        </div>
                        {renderDebug()}
                    </div>
                );
            }

            return null;
        }

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<BELBirdQuiz />);
    </script>
</body>
</html>
